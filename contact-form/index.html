<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form Practice</title>
  </head>
  <body>
    <!-- 1. Skip link -->
    <a href="#main-content">Skip to main content</a>

    <!-- 2. Site header + main nav -->
    <header>
      <h1>Contact Page</h1>
      <p>Contact message for users.</p>
      <nav aria-label="Main navigation">
        <ul>
          <li>
            <a href="/">Home</a>
          </li>
          <li>
            <a href="/about">About</a>
          </li>
          <li>
            <a href="/contact" aria-current="page">Contact</a>
          </li>
        </ul>
      </nav>
    </header>

    <main id="main-content">
      <!-- 3. Contact form -->
      <section>
        <h2>Contact Us</h2>

        <form>
          <!-- 4. Full name field -->
          <div>
            <label for="full-name">Full name</label>
            <input
              id="full-name"
              type="text"
              name="full-name"
              placeholder="e.g. Juan Dela Cruz"
              required
            />
          </div>

          <!-- 5. Email field -->
          <div>
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="e.g. juan@gmail.com"
              required
            />
          </div>

          <!-- 6. Phone field -->
          <div>
            <label for="phone">Phone</label>
            <input
              id="phone"
              type="tel"
              name="phone"
              placeholder="e.g. 123 456 7890"
            />
          </div>

          <!-- 7. Subject dropdown -->
          <div>
            <label for="subject">Subject</label>
            <select id="subject" name="subject" required>
              <option value="" disabled selected>Select a topic...</option>
              <option value="general">General Inquiry</option>
              <option value="support">Technical Support</option>
              <option value="sales">Sales</option>
              <option value="feedback">Feedback</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- 8. Message textarea -->
          <div>
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              cols="22"
              rows="5"
              placeholder="Write something..."
              required
            ></textarea>
          </div>

          <!-- 9. Grouped checkboxes — topics of interest -->
          <fieldset>
            <legend>Topics of Interests:</legend>
            <input type="checkbox" id="web" name="topics" value="web" />
            <label for="web">Web Development</label>

            <input type="checkbox" id="design" name="topics" value="design" />
            <label for="design">UI/UX Design</label>

            <input type="checkbox" id="ai" name="topics" value="ai" />
            <label for="ai">Artificial Intelligence</label>

            <input type="checkbox" id="mobile" name="topics" value="mobile" />
            <label for="mobile">Mobile Apps</label>
          </fieldset>

          <!-- 10. Radio buttons — preferred contact method -->
          <fieldset>
            <legend>Preferred Contact Method:</legend>
            <input
              type="radio"
              id="preferred-email"
              name="contact-method"
              value="preferred-email"
              checked
            />
            <label for="preferred-email">Email</label>

            <input
              type="radio"
              id="preferred-phone"
              name="contact-method"
              value="preferred-phone"
            />
            <label for="preferred-phone">Phone Call</label>

            <input
              type="radio"
              id="preferred-sms"
              name="contact-method"
              value="preferred-sms"
            />
            <label for="preferred-sms">SMS/Text</label>
          </fieldset>

          <!-- 11. Submit button -->
          <button type="submit">Submit</button>
        </form>
      </section>
    </main>

    <!-- 12. Footer -->
    <footer>
      <p>Copyright (c) 2026 Author. All Rights Reserved.</p>

      <nav aria-label="Social media links">
        <ul>
          <li>
            <a href="https://www.facebook.com">facebook icon</a>
          </li>
          <li>
            <a href="https://www.instagram.com">instagram icon</a>
          </li>
          <li>
            <a href="https://www.pinterest.com">pinterest icon</a>
          </li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
